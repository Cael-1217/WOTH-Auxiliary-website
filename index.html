<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEAT - World of Tanks 玩家辅助</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --bg-secondary: #141414;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #ffffff;
            --tab-bg-overlay: rgba(0, 0, 0, 0.55);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --card-shadow-hover: 0 16px 48px rgba(255, 255, 255, 0.08), 0 8px 32px rgba(0, 0, 0, 0.7);
            --settings-bg: rgba(30, 30, 30, 0.85);
            --settings-icon-color: #ccc;
            --settings-hover-bg: rgba(50, 50, 50, 0.9);
            --glow-color: rgba(255, 255, 255, 0.15);
            --icon-bg: rgba(20, 20, 20, 0.8);
            --icon-border: rgba(255, 255, 255, 0.2);
            --particle-color: rgba(255, 255, 255, 0.03);
            --overlay-pattern: rgba(255, 255, 255, 0.015);
            --border-glow: rgba(255, 255, 255, 0.5);
            --text-glow: rgba(255, 255, 255, 0.6);
        }

        /* 亮色模式变量 */
        body.light-mode {
            --bg-color: #f0f0f0;
            --bg-secondary: #e5e5e5;
            --text-color: #1a1a1a;
            --text-secondary: #444;
            --border-color: #1a1a1a;
            --tab-bg-overlay: rgba(255, 255, 255, 0.5);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            --card-shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.2), 0 8px 32px rgba(0, 0, 0, 0.12);
            --settings-bg: rgba(220, 220, 220, 0.9);
            --settings-icon-color: #333;
            --settings-hover-bg: rgba(200, 200, 200, 0.95);
            --glow-color: rgba(0, 0, 0, 0.08);
            --icon-bg: rgba(240, 240, 240, 0.9);
            --icon-border: rgba(0, 0, 0, 0.2);
            --particle-color: rgba(0, 0, 0, 0.02);
            --overlay-pattern: rgba(0, 0, 0, 0.01);
            --border-glow: rgba(0, 0, 0, 0.4);
            --text-glow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Rajdhani', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 背景粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--particle-color);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            70% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 20px;
        }

        /* 顶部图标区域 */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
            animation-delay: 0.1s;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 游戏图标 */
        .game-icon {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            background: var(--icon-bg);
            border: 2px solid var(--icon-border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            position: relative;
            overflow: visible;
            transition: all 0.5s ease;
            box-shadow: 0 0 40px var(--glow-color);
            animation: iconPulse 4s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%,
            100% {
                box-shadow: 0 0 40px var(--glow-color);
            }
            50% {
                box-shadow: 0 0 70px var(--border-glow);
            }
        }
        .game-icon svg {
            width: 60px;
            height: 60px;
            transition: transform 0.4s ease;
        }
        .game-icon:hover svg {
            transform: scale(1.08);
        }

        /* HEAT 文字 */
        .heat-text {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 14px;
            color: var(--text-color);
            text-transform: uppercase;
            position: relative;
            transition: color 0.6s ease;
            text-shadow: 0 0 60px var(--text-glow), 0 0 120px var(--text-glow);
            cursor: default;
            line-height: 1;
        }
        .heat-text::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: var(--border-color);
            border-radius: 1px;
            opacity: 0.5;
            transition: all 0.6s ease;
        }

        /* 选项卡容器 */
        .tabs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            animation: fadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
            animation-delay: 0.35s;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 单个选项卡 - 平行四边形 */
        .tab-item {
            position: relative;
            width: 300px;
            height: 100px;
            cursor: pointer;
            transform: skewX(-10deg);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
            border-top: 2.5px solid var(--border-color);
            border-bottom: 2.5px solid var(--border-color);
            border-left: none;
            border-right: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border-radius: 2px;
            /* 微小的圆角避免尖锐边缘 */;
        }

        /* 背景图片叠加层 */
        .tab-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--tab-bg-overlay);
            z-index: 1;
            transition: background 0.4s ease;
            pointer-events: none;
        }

        /* 悬停发光条 */
        .tab-item::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -10%;
            width: 120%;
            height: calc(100% + 6px);
            background: transparent;
            border-top: 2.5px solid transparent;
            border-bottom: 2.5px solid transparent;
            transition: all 0.35s ease;
            z-index: 3;
            pointer-events: none;
            border-radius: 2px;
        }
        .tab-item:hover::after {
            border-top-color: rgba(255, 255, 255, 0.7);
            border-bottom-color: rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.06);
        }
        body.light-mode .tab-item:hover::after {
            border-top-color: rgba(0, 0, 0, 0.5);
            border-bottom-color: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.06);
        }

        /* 点击缩放反馈 */
        .tab-item:active {
            transform: skewX(-10deg) scale(1.06);
            transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--card-shadow-hover);
        }

        /* 悬停状态 */
        .tab-item:hover {
            box-shadow: var(--card-shadow-hover);
            transform: skewX(-10deg) scale(1.03);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
        }

        /* 选项卡内部内容 */
        .tab-inner {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: skewX(10deg);
            /* 反向倾斜使文字正常 */
            pointer-events: none;
        }
        .tab-label {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #ffffff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
        }
        .tab-label::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 40px;
            height: 2px;
            background: #fff;
            border-radius: 1px;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.8;
        }
        .tab-item:hover .tab-label::after {
            transform: translateX(-50%) scaleX(1);
        }

        body.light-mode .tab-label {
            color: #1a1a1a;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.7), 0 0 20px rgba(255, 255, 255, 0.4);
        }
        body.light-mode .tab-label::after {
            background: #1a1a1a;
        }

        /* 各选项卡背景 */
        .tab-tanks {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150"><defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%233d4a30"/><stop offset="30%" stop-color="%232b3318"/><stop offset="60%" stop-color="%234a5c2e"/><stop offset="100%" stop-color="%231a1f0d"/></linearGradient><pattern id="noise" patternUnits="userSpaceOnUse" width="4" height="4"><rect width="4" height="4" fill="transparent"/><circle cx="2" cy="2" r="0.4" fill="rgba(255,255,255,0.03)"/></pattern></defs><rect width="400" height="150" fill="url(%23g1)"/><rect width="400" height="150" fill="url(%23noise)"/><line x1="0" y1="35" x2="400" y2="55" stroke="rgba(255,255,255,0.04)" stroke-width="18"/><line x1="0" y1="90" x2="400" y2="75" stroke="rgba(0,0,0,0.15)" stroke-width="12"/></svg>');
            background-size: cover;
            background-position: center;
        }
        .tab-maps {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150"><defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%233b4a5c"/><stop offset="35%" stop-color="%23253540"/><stop offset="65%" stop-color="%234a5a6e"/><stop offset="100%" stop-color="%231a2835"/></linearGradient><pattern id="noise2" patternUnits="userSpaceOnUse" width="6" height="6"><rect width="6" height="6" fill="transparent"/><circle cx="3" cy="3" r="0.5" fill="rgba(255,255,255,0.025)"/></pattern></defs><rect width="400" height="150" fill="url(%23g2)"/><rect width="400" height="150" fill="url(%23noise2)"/><path d="M0 60 Q100 20 200 55 T400 45" stroke="rgba(255,255,255,0.05)" stroke-width="20" fill="none"/><path d="M0 100 Q120 75 250 95 T400 85" stroke="rgba(0,0,0,0.12)" stroke-width="14" fill="none"/></svg>');
            background-size: cover;
            background-position: center;
        }
        .tab-credits {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150"><defs><linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%234a3a2e"/><stop offset="30%" stop-color="%233d2e1a"/><stop offset="60%" stop-color="%235c4a30"/><stop offset="100%" stop-color="%2322180d"/></linearGradient><pattern id="noise3" patternUnits="userSpaceOnUse" width="5" height="5"><rect width="5" height="5" fill="transparent"/><circle cx="2.5" cy="2.5" r="0.45" fill="rgba(255,215,150,0.04)"/></pattern></defs><rect width="400" height="150" fill="url(%23g3)"/><rect width="400" height="150" fill="url(%23noise3)"/><ellipse cx="200" cy="75" rx="180" ry="45" fill="rgba(255,200,100,0.04)"/></svg>');
            background-size: cover;
            background-position: center;
        }

        /* 设置按钮 */
        .settings-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 100;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--settings-bg);
            border: 1.5px solid var(--icon-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            outline: none;
            animation: fadeInSettings 0.7s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }
        @keyframes fadeInSettings {
            to {
                opacity: 1;
            }
        }
        .settings-btn:hover {
            background: var(--settings-hover-bg);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            transform: scale(1.08);
        }
        .settings-btn:active {
            transform: scale(0.94);
            transition: transform 0.1s ease;
        }
        .settings-btn svg {
            width: 26px;
            height: 26px;
            transition: transform 0.6s cubic-bezier(0.68, -0.3, 0.27, 1.3);
            color: var(--settings-icon-color);
            stroke: var(--settings-icon-color);
            fill: none;
            stroke-width: 2;
        }
        .settings-btn:hover svg {
            transform: rotate(75deg);
        }

        /* 模式提示文字 */
        .mode-tooltip {
            position: fixed;
            bottom: 94px;
            right: 40px;
            z-index: 99;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            text-transform: uppercase;
            font-weight: 500;
        }
        .mode-tooltip.visible {
            opacity: 1;
            animation: tooltipFade 2s ease forwards;
        }
        @keyframes tooltipFade {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            15% {
                opacity: 1;
                transform: translateY(0);
            }
            75% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-6px);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .heat-text {
                font-size: 48px;
                letter-spacing: 10px;
            }
            .game-icon {
                width: 75px;
                height: 75px;
                border-radius: 18px;
                margin-bottom: 14px;
            }
            .game-icon svg {
                width: 44px;
                height: 44px;
            }
            .logo-section {
                margin-bottom: 35px;
            }
            .tab-item {
                width: 240px;
                height: 82px;
                transform: skewX(-8deg);
            }
            .tab-item:active {
                transform: skewX(-8deg) scale(1.05);
            }
            .tab-item:hover {
                transform: skewX(-8deg) scale(1.03);
            }
            .tab-inner {
                transform: skewX(8deg);
            }
            .tab-label {
                font-size: 22px;
                letter-spacing: 4px;
            }
            .tabs-container {
                gap: 22px;
            }
            .settings-btn {
                bottom: 22px;
                right: 18px;
                width: 44px;
                height: 44px;
            }
            .settings-btn svg {
                width: 22px;
                height: 22px;
            }
            .mode-tooltip {
                bottom: 76px;
                right: 26px;
                font-size: 11px;
            }
        }

        @media (max-width: 400px) {
            .heat-text {
                font-size: 36px;
                letter-spacing: 7px;
            }
            .game-icon {
                width: 60px;
                height: 60px;
                border-radius: 14px;
                margin-bottom: 10px;
            }
            .game-icon svg {
                width: 34px;
                height: 34px;
            }
            .logo-section {
                margin-bottom: 28px;
            }
            .tab-item {
                width: 190px;
                height: 68px;
                transform: skewX(-7deg);
                border-top-width: 2px;
                border-bottom-width: 2px;
            }
            .tab-item:active {
                transform: skewX(-7deg) scale(1.04);
            }
            .tab-item:hover {
                transform: skewX(-7deg) scale(1.02);
            }
            .tab-inner {
                transform: skewX(7deg);
            }
            .tab-label {
                font-size: 18px;
                letter-spacing: 3px;
            }
            .tabs-container {
                gap: 18px;
            }
            .settings-btn {
                bottom: 16px;
                right: 12px;
                width: 38px;
                height: 38px;
            }
            .settings-btn svg {
                width: 18px;
                height: 18px;
            }
            .mode-tooltip {
                bottom: 64px;
                right: 18px;
                font-size: 10px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 顶部图标和文字 -->
        <div class="logo-section">
            <div class="game-icon" title="World of Tanks: HEAT">
                <!-- 坦克图标 SVG -->
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <!-- 履带 -->
                    <rect x="6" y="38" width="52" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.9"/>
                    <rect x="8" y="40" width="48" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
                    <!-- 车身 -->
                    <polygon points="12,38 20,18 44,18 52,38" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" opacity="0.85"/>
                    <!-- 炮塔 -->
                    <polygon points="24,18 40,18 38,8 26,8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>
                    <!-- 炮管 -->
                    <line x1="32" y1="8" x2="32" y2="-2" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
                    <!-- 细节 -->
                    <circle cx="22" cy="28" r="3" fill="currentColor" opacity="0.4"/>
                    <circle cx="42" cy="28" r="3" fill="currentColor" opacity="0.4"/>
                    <line x1="20" y1="38" x2="16" y2="50" stroke="currentColor" stroke-width="2" opacity="0.5"/>
                    <line x1="44" y1="38" x2="48" y2="50" stroke="currentColor" stroke-width="2" opacity="0.5"/>
                </svg>
            </div>
            <h1 class="heat-text">HEAT</h1>
        </div>

        <!-- 选项卡容器 -->
        <div class="tabs-container">
            <!-- 坦克 -->
            <div class="tab-item tab-tanks" data-tab="tanks" role="button" tabindex="0" aria-label="坦克">
                <div class="tab-inner">
                    <span class="tab-label">坦 克</span>
                </div>
            </div>
            <!-- 地图 -->
            <div class="tab-item tab-maps" data-tab="maps" role="button" tabindex="0" aria-label="地图">
                <div class="tab-inner">
                    <span class="tab-label">地 图</span>
                </div>
            </div>
            <!-- 鸣谢 -->
            <div class="tab-item tab-credits" data-tab="credits" role="button" tabindex="0" aria-label="鸣谢">
                <div class="tab-inner">
                    <span class="tab-label">鸣 谢</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 设置按钮 -->
    <button class="settings-btn" id="settingsBtn" aria-label="切换亮色/暗色模式" title="切换亮色/暗色模式">
        <!-- 齿轮+日月图标 -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <!-- 齿轮 -->
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2.5" stroke-linecap="round"/>
            <path d="M12 19.5V22" stroke-linecap="round"/>
            <path d="M2 12h2.5" stroke-linecap="round"/>
            <path d="M19.5 12H22" stroke-linecap="round"/>
            <path d="M4.93 4.93l1.77 1.77" stroke-linecap="round"/>
            <path d="M17.3 17.3l1.77 1.77" stroke-linecap="round"/>
            <path d="M4.93 19.07l1.77-1.77" stroke-linecap="round"/>
            <path d="M17.3 6.7l1.77-1.77" stroke-linecap="round"/>
        </svg>
    </button>
    <div class="mode-tooltip" id="modeTooltip"></div>

    <script>
        (function() {
            // ============ DOM 元素 ============
            const body = document.body;
            const settingsBtn = document.getElementById('settingsBtn');
            const modeTooltip = document.getElementById('modeTooltip');
            const tabItems = document.querySelectorAll('.tab-item');
            const particlesContainer = document.getElementById('particles');

            // ============ 状态管理 ============
            let isLightMode = false;

            // 从 localStorage 读取模式偏好
            const savedMode = localStorage.getItem('heat-light-mode');
            if (savedMode === 'true') {
                isLightMode = true;
                body.classList.add('light-mode');
            }

            // ============ 背景粒子生成 ============
            function createParticles() {
                const particleCount = 35;
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 3 + 1.2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = Math.random() * 14 + 10 + 's';
                    particle.style.animationDelay = Math.random() * 12 + 's';
                    particle.style.opacity = Math.random() * 0.6 + 0.1;
                    fragment.appendChild(particle);
                }
                particlesContainer.appendChild(fragment);
            }
            createParticles();

            // ============ 设置按钮 - 切换亮色/暗色模式 ============
            function showTooltip(message) {
                modeTooltip.textContent = message;
                modeTooltip.classList.remove('visible');
                // 触发回流以重新开始动画
                void modeTooltip.offsetWidth;
                modeTooltip.classList.add('visible');
                // 动画结束后移除
                setTimeout(() => {
                    modeTooltip.classList.remove('visible');
                }, 2100);
            }

            settingsBtn.addEventListener('click', () => {
                isLightMode = !isLightMode;
                if (isLightMode) {
                    body.classList.add('light-mode');
                    localStorage.setItem('heat-light-mode', 'true');
                    showTooltip('☀️ 亮色模式');
                } else {
                    body.classList.remove('light-mode');
                    localStorage.setItem('heat-light-mode', 'false');
                    showTooltip('🌙 暗色模式');
                }
            });

            // ============ 选项卡点击反馈 ============
            tabItems.forEach(tab => {
                tab.addEventListener('click', function(e) {
                    const tabName = this.getAttribute('data-tab');
                    // 点击时的脉冲动画
                    this.style.transition = 'transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    const skewDeg = window.innerWidth <= 400 ? '-7deg' :
                        window.innerWidth <= 768 ? '-8deg' : '-10deg';
                    this.style.transform = `skewX(${skewDeg}) scale(1.08)`;

                    // 短暂延迟后恢复
                    setTimeout(() => {
                        this.style.transition =
                            'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease';
                        this.style.transform = `skewX(${skewDeg}) scale(1)`;
                    }, 130);

                    // 控制台输出（后续可扩展为页面跳转）
                    console.log(`[HEAT] 选项卡被点击: ${tabName}`);
                    // 这里可以添加后续的页面跳转逻辑
                    // 例如: window.location.href = `/${tabName}.html`;
                });

                // 键盘可访问性
                tab.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });

            // ============ 初始化完成日志 ============
            console.log('%c🚀 HEAT 玩家辅助面板已就绪 %c| %cWorld of Tanks: HEAT',
                'font-weight:bold;font-size:16px;color:#f0c040;',
                '',
                'color:#aaa;');
            console.log('%c💡 点击右下角齿轮切换亮色/暗色模式',
                'color:#888;font-style:italic;');
            console.log('%c🖱️ 点击选项卡体验缩放反馈效果',
                'color:#888;font-style:italic;');

            // ============ 键盘快捷键 ============
            document.addEventListener('keydown', function(e) {
                // 按 'M' 键切换模式
                if (e.key === 'm' || e.key === 'M') {
                    // 检查是否没有在输入框中
                    const activeEl = document.activeElement;
                    if (!activeEl || activeEl.tagName === 'BODY' || activeEl === settingsBtn) {
                        e.preventDefault();
                        settingsBtn.click();
                    }
                }
                // 按数字键1/2/3快速选择选项卡
                if (e.key === '1' || e.key === '2' || e.key === '3') {
                    const activeEl = document.activeElement;
                    if (!activeEl || activeEl.tagName === 'BODY') {
                        e.preventDefault();
                        const index = parseInt(e.key) - 1;
                        if (tabItems[index]) {
                            tabItems[index].click();
                            tabItems[index].focus();
                        }
                    }
                }
            });

        })();
    </script>
</body>
</html>
